services:
  # Mem0 API Service
  mem0-api:
    build:
      context: ./mem0-api
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      QDRANT_HOST: ${QDRANT_HOST:-tools_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - mem0-api-cache:/app/.cache

  # OpenMemory MCP - Canal Principal
  openmemory-mcp-main:
    image: mem0/openmemory-mcp:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USER: openclaw_memory_main
      QDRANT_HOST: ${QDRANT_HOST:-tools_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    networks:
      - mem0-network
    restart: unless-stopped
    volumes:
      - openmemory-mcp-main-data:/usr/src/openmemory

  # OpenMemory MCP - Canal WhatsApp
  openmemory-mcp-whatsapp:
    image: mem0/openmemory-mcp:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USER: openclaw_memory_whatsapp
      QDRANT_HOST: ${QDRANT_HOST:-tools_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    networks:
      - mem0-network
    restart: unless-stopped
    volumes:
      - openmemory-mcp-whatsapp-data:/usr/src/openmemory

  # OpenMemory MCP - Canal Email
  openmemory-mcp-email:
    image: mem0/openmemory-mcp:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USER: openclaw_memory_email
      QDRANT_HOST: ${QDRANT_HOST:-tools_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    networks:
      - mem0-network
    restart: unless-stopped
    volumes:
      - openmemory-mcp-email-data:/usr/src/openmemory

  # OpenMemory UI Service
  openmemory-ui:
    image: mem0/openmemory-ui:latest
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://tools-mem0-mcp.vtc.srv.br}
      NEXT_PUBLIC_USER_ID: ${NEXT_PUBLIC_USER_ID:-openclaw_memory_main}
    depends_on:
      - openmemory-mcp-main
    networks:
      - mem0-network
    restart: unless-stopped

networks:
  mem0-network:
    driver: bridge

volumes:
  mem0-api-cache:
    driver: local
  openmemory-mcp-main-data:
    driver: local
  openmemory-mcp-whatsapp-data:
    driver: local
  openmemory-mcp-email-data:
    driver: local
