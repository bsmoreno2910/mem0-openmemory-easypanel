services:
  # Mem0 API Service
  mem0-api:
    build:
      context: ./mem0-api
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-large}
      VECTOR_STORE: ${VECTOR_STORE:-qdrant}
      QDRANT_HOST: ${QDRANT_HOST:-tools_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    networks:
      - mem0-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - mem0-api-cache:/app/.cache

  # OpenMemory MCP - Único (usuários criados dinamicamente via API)
  openmemory-mcp:
    image: mem0/openmemory-mcp:latest
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      USER: ${MCP_USER:-openclaw}
      QDRANT_HOST: ${QDRANT_HOST:-tools_qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    networks:
      - mem0-network
    restart: unless-stopped
    volumes:
      - openmemory-mcp-data:/usr/src/openmemory

  # Mem0 Dashboard - UI customizada com seletor dinâmico de usuário
  mem0-dashboard:
    build:
      context: ./mem0-dashboard
      dockerfile: Dockerfile
    networks:
      - mem0-network
    restart: unless-stopped

  # OpenMemory UI Service (nativa)
  openmemory-ui:
    image: mem0/openmemory-ui:latest
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://tools-mem0-mcp.vtc.srv.br}
      NEXT_PUBLIC_USER_ID: ${NEXT_PUBLIC_USER_ID:-openclaw}
    networks:
      - mem0-network
    restart: unless-stopped

networks:
  mem0-network:
    driver: bridge

volumes:
  mem0-api-cache:
    driver: local
  openmemory-mcp-data:
    driver: local
